{{- if and .Values.gateway.configContent (not .Values.gateway.existingConfigSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gateway.fullname" . }}-config
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  gateway.toml: {{ .Values.gateway.configContent | quote }}
{{- end }}
