replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

nameOverride: ""
fullnameOverride: ""

image:
  repository: docker.io/jaegertracing/jaeger
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

service:
  type: ClusterIP
  annotations: {}

clickhouse:
  # Remote ClickHouse host (no scheme, just the hostname).
  host: "128.0.0.1"
  # Remote ClickHouse port.
  port: 8123
  # ClickHouse database name.
  database: jaeger

  # Set to true when ClickHouse is exposed over TLS (HTTPS/native-TLS).
  # When enabled, a socat sidecar is injected into the pod to bridge plain
  # HTTP on localhost:8123 → TLS towards clickhouse.host:clickhouse.port.
  # Jaeger's ClickHouse storage plugin does not support TLS natively, so the
  # sidecar acts as a transparent in-pod proxy.
  # When disabled, Jaeger connects directly to clickhouse.host:clickhouse.port
  # using plain HTTP — no socat sidecar is deployed.
  tls: false

  # Credentials — choose one of the two options below:
  #
  # Option A — plain values (recommended for Qovery).
  # The chart will create a Secret from these values.
  # On Qovery, use the qovery.env.* macro in your values override:
  #   clickhouse:
  #     username: "qovery.env.CLICKHOUSE_USERNAME"
  #     password: "qovery.env.CLICKHOUSE_PASSWORD"
  username: ""
  password: ""

  # Option B — reference a pre-existing Kubernetes Secret.
  # The Secret must have keys "username" and "password".
  # When set, takes precedence over username/password above.
  existingSecret: ""

  # socat sidecar that bridges local plain HTTP → remote HTTPS.
  # Only used when clickhouse.tls is true.
  socat:
    image:
      repository: docker.io/alpine/socat
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 32Mi

# ── Jaeger / OTel Collector configuration ────────────────────────────────────
#
# The chart generates the full Jaeger config from the values above (clickhouse.*
# etc.).  Use extraConfig to override any generated key or to inject additional
# OTel extensions / processors / exporters.
#
# extraConfig is deep-merged on top of the generated config, so any key set
# here takes precedence.
#
# Example — lower the log level and add a batch processor:
#   extraConfig:
#     service:
#       telemetry:
#         logs:
#           level: debug
#     processors:
#       batch: {}
#     service:
#       pipelines:
#         traces:
#           processors:
#             - batch
extraConfig: {}
